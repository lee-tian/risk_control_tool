services:
  risk-exposure-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: risk-exposure-api
    env_file:
      - .env
    environment:
      APP_STORAGE_DRIVER: sqlite
      FUTU_OPEND_HOST: host.docker.internal
      FUTU_OPEND_PORT: 11111
      MOOMOO_GET_OPTION_CHAIN_SCRIPT: /opt/moomoo/scripts/quote/get_option_chain.py
      MOOMOO_GET_OPTION_EXPIRATION_DATE_SCRIPT: /opt/moomoo/scripts/quote/get_option_expiration_date.py
      MOOMOO_GET_OPTION_SNAPSHOTS_SCRIPT: /app/api/scripts/get_moomoo_option_snapshots.py
      MOOMOO_GET_KLINE_SCRIPT: /opt/moomoo/scripts/quote/get_kline.py
    volumes:
      - ./data:/app/data
      - /Users/emily/.codex/skills/moomooapi/scripts:/opt/moomoo/scripts:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  risk-exposure-tool:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: risk-exposure-tool
    depends_on:
      - risk-exposure-api
    ports:
      - "60688:80"
    restart: unless-stopped

  unit-tests:
    profiles:
      - test
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -lc "rm -rf node_modules && npm install --legacy-peer-deps && npm run test:unit"
