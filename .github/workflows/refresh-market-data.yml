name: Refresh Market Data

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      force_refresh:
        description: Force refresh even outside market hours
        required: false
        default: false
        type: boolean

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger background refresh endpoint
        env:
          CRON_REFRESH_URL: ${{ secrets.CRON_REFRESH_URL || vars.CRON_REFRESH_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          FORCE_REFRESH: ${{ github.event.inputs.force_refresh }}
        run: |
          if [ -z "$CRON_REFRESH_URL" ]; then
            echo "Missing CRON_REFRESH_URL secret"
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_SECRET secret"
            exit 1
          fi

          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$CRON_REFRESH_URL" \
            -d "{\"source\":\"github-actions\",\"include_vix\":true,\"force\":${FORCE_REFRESH:-false}}"
